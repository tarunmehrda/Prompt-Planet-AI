<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="60" viewBox="0 0 1280 60" fill="none" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#12b5c9" stop-opacity="0"/>
      <stop offset="25%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#2ee6a6"/>
      <stop offset="75%" stop-color="#7dffce"/>
      <stop offset="100%" stop-color="#12b5c9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- flowing dragon-green wave -->
  <path d="M0 30 C 160 6, 320 6, 480 30 S 800 54, 960 30 S 1120 6, 1280 30" stroke="url(#dg)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M0 30 C 160 6, 320 6, 480 30 S 800 54, 960 30 S 1120 6, 1280 30;
              M0 30 C 160 54, 320 54, 480 30 S 800 6, 960 30 S 1120 54, 1280 30;
              M0 30 C 160 6, 320 6, 480 30 S 800 54, 960 30 S 1120 6, 1280 30"
      dur="8s" repeatCount="indefinite"/>
  </path>
  <!-- travelling spark -->
  <circle r="4" fill="#eafff6">
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    <animateMotion dur="3s" repeatCount="indefinite"
      path="M0 30 C 160 6, 320 6, 480 30 S 800 54, 960 30 S 1120 6, 1280 30"/>
  </circle>
  <!-- centre diamond -->
  <g transform="translate(640 30)">
    <rect x="-6" y="-6" width="12" height="12" fill="#2ee6a6" transform="rotate(45)">
      <animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
